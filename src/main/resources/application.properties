spring.application.name=hnclothing

# ==============================
# SERVER CONFIG
# ==============================
server.port=8080

# ==============================
# DATABASE CONFIG (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/hnclothing_shop?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE CONFIG
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# FILE UPLOAD
# ==============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=100MB

# PayOS Configuration
payos.client-id=
payos.api-key=
payos.checksum-key=



# Groq API Configuration
ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.api.key=


# Email Configuration (V� d? d�ng Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true