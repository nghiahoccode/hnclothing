<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HN Clothing</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* LUXURY DEEP LIGHT - REFINED VERSION
   Palette: Deep Sage, Slate Gray, Pearl Smoke, Silver Mist
*/

:root {
    --bg-main: #e2e8e4;             /* Nền xám xanh nhạt, dịu mắt hơn trắng */
    --card-bg: #ffffff;
    --primary-deep: #4a5d59;        /* Xanh rêu đá đậm - Sang trọng, không chói */
    --accent-slate: #708090;        /* Xám phiến thạch */
    --text-main: #2f353b;           /* Màu than chì cho chữ */
    --text-muted: #64748b;
    --input-focus-glow: rgba(74, 93, 89, 0.15);

    /* Hiệu ứng đổ bóng đa tầng (Depth Shadow) */
    --shadow-base: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
    --shadow-hover: 0 25px 50px -12px rgba(47, 53, 59, 0.2);

    --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #d1d9d5 0%, #e2e8e4 100%);
    padding: 24px;
}

.login-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 440px;
    padding: 50px 45px;
    border-radius: 24px;
    box-shadow: var(--shadow-base);
    border: 1px solid rgba(255, 255, 255, 0.8);
    transition: var(--transition);
    animation: slideUpFade 0.7s ease-out;
}

.login-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-hover);
}

/* Typography */
.brand-logo {
    font-family: 'Playfair Display', serif;
    color: var(--primary-deep);
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 5px;
    text-align: center;
}

.brand-slogan {
    color: var(--accent-slate);
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
    font-weight: 500;
}

/* Form Styling */
.form-group {
    position: relative;
    margin-bottom: 24px;
}

.form-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-deep);
    opacity: 0.6;
    transition: var(--transition);
}

.form-control-icon-padding {
    width: 100%;
    height: 54px;
    padding-left: 50px !important;
    background: #f8faf9; /* Trắng khói, không chói */
    border: 1px solid #d1d9d5;
    border-radius: 14px;
    color: var(--text-main);
    transition: var(--transition);
}

.form-control-icon-padding:focus {
    background: #ffffff;
    border-color: var(--primary-deep);
    box-shadow: 0 0 0 4px var(--input-focus-glow);
    outline: none;
}

.form-control-icon-padding:focus + .form-icon {
    opacity: 1;
}

/* Nút bấm Đậm & Sang */
.btn-login {
    width: 100%;
    height: 54px;
    background: var(--primary-deep);
    color: #ffffff;
    border: none;
    border-radius: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 8px 15px rgba(74, 93, 89, 0.2);
    margin-top: 10px;
}

.btn-login:hover {
    background: #3b4b47; /* Đậm hơn khi hover */
    box-shadow: 0 12px 25px rgba(74, 93, 89, 0.3);
    transform: scale(1.01);
}

/* Alerts mờ nhưng rõ ràng */
.alert {
    border-radius: 12px;
    padding: 14px;
    border-left: 4px solid;
    margin-bottom: 25px;
    font-size: 0.85rem;
    background: #f1f5f4;
}

.alert-info { border-color: var(--accent-slate); color: var(--text-main); }
.alert-danger { border-color: #a66e6e; color: #721c24; background: #fdf2f2; }
.alert-success { border-color: var(--primary-deep); color: #2d4a44; background: #f2f7f6; }

/* Links & Footer */
.register-link {
    margin-top: 35px;
    padding-top: 25px;
    border-top: 1px solid #eef2f1;
    text-align: center;
}

.register-link a {
    color: var(--primary-deep);
    font-weight: 700;
    text-decoration: none;
    transition: var(--transition);
}

.register-link a:hover {
    color: var(--text-main);
    text-decoration: underline;
}

/* Hiệu ứng chuyển cảnh */
@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div th:if="${param.logout}" class="alert alert-info" role="alert">
            Bạn đã **đăng xuất thành công**.
        </div>
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Email hoặc mật khẩu **không đúng**. Vui lòng thử lại.
        </div>
        <div th:if="${param.register_success}" class="alert alert-success" role="alert">
            Đăng ký **thành công**! Vui lòng đăng nhập.
        </div>
        <h1 class="brand-logo">HN CLOTHING</h1>
        <p class="brand-slogan">Thời trang tối giản cho người Việt</p>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <i class="fas fa-envelope form-icon"></i>
                <input type="email"
                       class="form-control form-control-icon-padding"
                       id="email"
                       name="username"  placeholder="Địa chỉ Email" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password"
                       class="form-control form-control-icon-padding"
                       id="password"
                       name="password" placeholder="Mật khẩu"
                       required>
            </div>

            <div class="d-flex justify-content-between mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me">
                    <label class="form-check-label" for="rememberMe">
                        Ghi nhớ tôi
                    </label>
                </div>
                <a th:href="@{/forgot-password}" href="#" class="text-decoration-none" style="color: #1E2C3D;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>

        <div class="register-link">
            <p class="mb-0">
                Chưa có tài khoản?
                <a th:href="@{/register}">Đăng ký ngay</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
