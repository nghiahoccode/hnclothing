<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HN CLOTHING</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #1a1a1a;
            --brand-gray: #f4f4f4;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Bên trái: Ảnh lookbook (40%) */
        .bg-left {
            flex: 0 0 36%;
            background: url('https://i.pinimg.com/1200x/2f/4e/cd/2f4ecda518463716238bf45fca1bcea3.jpg') center/cover no-repeat;
            filter: grayscale(20%);
        }

        /* Ở giữa: Dải màu nền Form (20%) */
        .bg-middle {
            flex: 0 0 28%;
            background: #a5ccd6;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Bên phải: Ảnh sản phẩm (40%) */
        .bg-right {
            flex: 0 0 36%;
            background: url('https://i.pinimg.com/736x/15/ac/ca/15acca80b52e4486bca2bafab7b60602.jpg') center/cover no-repeat;
            filter: grayscale(20%);
        }

        .register-card {
            width: 420px;
            background: #ffffff;
            padding: 35px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            max-height: 90vh;
            overflow-y: auto;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-align: center;
            color: var(--brand-dark);
        }

        .form-group {
            position: relative;
            margin-bottom: 15px;
        }

        .form-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            z-index: 5;
        }

        .form-control-icon-padding {
            padding-left: 40px;
            height: 42px;
            border-radius: 2px;
        }

        .btn-register {
            width: 100%;
            background: var(--brand-dark);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .login-link a {
            color: var(--brand-dark);
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 1200px) {
            .bg-left, .bg-right { display: none; }
            .bg-middle { flex: 0 0 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="bg-left"></div>

    <div class="bg-middle">
        <div class="register-card">
            <div class="text-center mb-4">
                <h2 class="brand-logo">ĐĂNG KÝ TÀI KHOẢN </h2>
                <p class="small text-muted">Gia nhập HN Clothing</p>
            </div>

            <form th:action="@{/register}" method="post" th:object="${registrationDTO}" id="registerForm" class="needs-validation" novalidate>
                <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

                <div class="form-group">
                    <i class="fas fa-user form-icon"></i>
                    <input type="text" class="form-control form-control-icon-padding" th:field="*{fullName}" placeholder="Họ và Tên" required minlength="5">
                </div>

                <div class="form-group">
                    <i class="fas fa-envelope form-icon"></i>
                    <input type="email" class="form-control form-control-icon-padding" th:field="*{email}" placeholder="Địa chỉ Email" required>
                </div>

                <div class="form-group">
                    <i class="fas fa-phone form-icon"></i>
                    <input type="tel" class="form-control form-control-icon-padding" th:field="*{phone}" placeholder="Số điện thoại" required pattern="[0-9]{10,11}">
                </div>

                <input type="hidden" th:field="*{gender}" th:value="${T(com.hnclothing.user.Gender).Nam}" />

                <div class="form-group">
                    <i class="fas fa-lock form-icon"></i>
                    <input type="password" class="form-control form-control-icon-padding" id="password" th:field="*{password}" placeholder="Mật khẩu" required minlength="6">
                </div>

                <div class="form-group">
                    <i class="fas fa-lock form-icon"></i>
                    <input type="password" class="form-control form-control-icon-padding" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                    <div class="invalid-feedback" id="confirmPasswordError"></div>
                </div>

                <div class="form-check mb-3 small">
                    <input class="form-check-input" type="checkbox" id="acceptTerms" required>
                    <label class="form-check-label" for="acceptTerms">Tôi đồng ý với Điều khoản</label>
                </div>

                <button type="submit" class="btn btn-register">Đăng ký ngay</button>
            </form>

            <div class="login-link text-center mt-3 small">
                <p>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <div class="bg-right"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');

        form.addEventListener('submit', function(e) {
            if (password.value !== confirm.value) {
                confirm.setCustomValidity('Mật khẩu không khớp');
                document.getElementById('confirmPasswordError').textContent = 'Mật khẩu xác nhận không khớp.';
            } else {
                confirm.setCustomValidity('');
            }

            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    });
</script>
</body>
</html>
