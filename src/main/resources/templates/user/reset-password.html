<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt lại mật khẩu - HN CLOTHING</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --white: #ffffff;
            --text-main: #2d3436;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Sửa lỗi input tràn khung */
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .brand-slogan {
            color: #636e72;
            font-size: 0.85rem;
            margin-bottom: 35px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        /* Định vị icon chuẩn, không đè lên chữ */
        .form-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
            transition: var(--transition);
            pointer-events: none;
            font-size: 1.1rem;
        }

        .form-control-custom {
            width: 100%;
            padding: 14px 16px 14px 48px; /* Padding trái rộng để chừa chỗ cho icon */
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            color: var(--text-main);
        }

        .form-control-custom:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(44, 62, 80, 0.1);
        }

        /* Icon đổi màu khi input được focus */
        .form-control-custom:focus ~ .form-icon {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #636e72;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Animation khi hiện trang */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1 class="brand-logo">MẬT KHẨU MỚI</h1>
    <p class="brand-slogan">Thiết lập mật khẩu an toàn</p>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">

        <div class="form-group">
            <i class="fas fa-lock form-icon"></i>
            <input type="password" name="password"
                   class="form-control-icon-padding"
                   placeholder="Mật khẩu mới" required>
        </div>

        <button type="submit" class="btn-login">Cập nhật mật khẩu</button>
    </form>
</div>
</body>
</html>
