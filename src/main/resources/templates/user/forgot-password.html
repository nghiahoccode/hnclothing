<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - HN CLOTHING</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Sử dụng lại toàn bộ bộ biến màu của bạn */
        :root {
            --bg-main: #e2e8e4;
            --card-bg: #ffffff;
            --primary-deep: #4a5d59;
            --accent-slate: #708090;
            --text-main: #2f353b;
            --shadow-base: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { background: linear-gradient(135deg, #d1d9d5 0%, #e2e8e4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .login-card {
            background: var(--card-bg); width: 100%; max-width: 440px; padding: 50px 45px;
            border-radius: 24px; box-shadow: var(--shadow-base); animation: slideUpFade 0.7s ease-out;
        }

        .brand-logo { font-family: 'Playfair Display', serif; color: var(--primary-deep); font-size: 2rem; font-weight: 800; letter-spacing: 4px; text-align: center; margin-bottom: 30px; }

        .form-group { position: relative; margin-bottom: 24px; }
        .form-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary-deep); opacity: 0.6; }

        .form-control-icon-padding {
            width: 100%; height: 54px; padding-left: 50px !important; background: #f8faf9;
            border: 1px solid #d1d9d5; border-radius: 14px; transition: var(--transition);
        }

        .btn-login {
            width: 100%; height: 54px; background: var(--primary-deep); color: #ffffff;
            border: none; border-radius: 14px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; transition: var(--transition); margin-top: 10px;
        }

        .btn-login:hover { background: #3b4b47; transform: scale(1.01); }

        .back-link { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eef2f1; }
        .back-link a { color: var(--accent-slate); text-decoration: none; font-size: 0.9rem; }

        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="login-card">
    <h1 class="brand-logo">QUÊN MẬT KHẨU</h1>

    <div th:if="${error}" class="alert alert-danger" style="border-radius: 12px; font-size: 0.85rem;" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" style="border-radius: 12px; font-size: 0.85rem;" th:text="${message}"></div>

    <p style="color: var(--text-main); font-size: 0.9rem; text-align: center; margin-bottom: 25px;">
        Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu.
    </p>

    <form th:action="@{/forgot-password}" method="post">
        <div class="form-group">
            <i class="fas fa-envelope form-icon"></i>
            <input type="email" name="email" class="form-control form-control-icon-padding"
                   placeholder="Địa chỉ Email của bạn" required>
        </div>

        <button type="submit" class="btn btn-login">
            Gửi yêu cầu
        </button>
    </form>

    <div class="back-link">
        <a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
</div>

</body>
</html>
