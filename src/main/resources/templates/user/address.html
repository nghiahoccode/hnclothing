<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HNClothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
  background-color: #f0f0f0 !important; /* Giảm độ sáng của nền toàn trang */
}
      /* Tùy chỉnh Font chữ nếu có thể, ưu tiên Montserrat hoặc Playfair Display */
.custom-navbar {
  background-color: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #f0f0f0;
  padding: 15px 0;
  transition: all 0.3s ease;
}

/* Logo Style */
.luxury-logo {
  font-weight: 800;
  letter-spacing: 2px;
  color: #1a1a1a !important;
  font-size: 1.5rem;
}
.luxury-logo span {
  font-weight: 300;
  color: #bfa37e; /* Màu Gold nhạt */
}

/* Navigation Links */
.navbar-nav .nav-link {
  color: #444 !important;
  font-size: 0.9rem;
  text-transform: uppercase;
  font-weight: 500;
  letter-spacing: 1px;
  margin: 0 10px;
  position: relative;
}

.navbar-nav .nav-link::after {
  content: '';
  position: absolute;
  width: 0;
  height: 1.5px;
  bottom: 0;
  left: 0;
  background-color: #bfa37e;
  transition: width 0.3s ease;
}

.navbar-nav .nav-link:hover::after {
  width: 100%;
}

/* Search Box Clean */
.search-box {
  border-bottom: 1px solid #ddd;
  padding-bottom: 2px;
}
.form-control-clean {
  border: none;
  background: transparent;
  outline: none;
  font-size: 0.9rem;
  padding: 5px;
}
.btn-search {
  border: none;
  background: none;
  color: #888;
}

/* Icons & Badge */
.nav-icon-link {
  color: #1a1a1a;
  font-size: 1.2rem;
  text-decoration: none;
  transition: color 0.3s;
}
.nav-icon-link:hover {
  color: #bfa37e;
}

.cart-badge {
  position: absolute;
  top: -5px;
  right: -10px;
  background-color: #1a1a1a;
  color: #fff;
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 50%;
  font-weight: bold;
}

/* Dropdown Luxury */
.dropdown-menu {
  border-radius: 0;
  margin-top: 15px;
  font-size: 0.9rem;
}
.dropdown-item:hover {
  background-color: #f9f9f9;
  color: #bfa37e;
}
/* Container chính */
.sidebar-menu {
    border: 1px solid #e2e8f0;
    overflow: hidden;
    transition: all 0.3s ease;
}

/* Các item menu */
.sidebar-menu a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    text-decoration: none;
    color: #475569; /* Slate Gray - chuyên nghiệp, lạnh */
    font-weight: 500;
    font-size: 0.95rem;
    border-bottom: 1px solid #f1f5f9;
    transition: all 0.2s ease-in-out;
}

/* Item cuối cùng không có border */
.sidebar-menu a:last-child {
    border-bottom: none;
}

/* Hiệu ứng Hover */
.sidebar-menu a:hover {
    background-color: #f8fafc;
    color: #0d9488; /* Teal/Emerald lạnh */
    padding-left: 25px; /* Hiệu ứng trượt nhẹ */
}

/* Trạng thái Active - Phong cách Luxury */
.sidebar-menu a.active {
    background-color: #f0fdfa; /* Nền xanh bạc hà cực nhạt */
    color: #0d9488;
    border-left: 4px solid #0d9488; /* Thanh chỉ thị bên lề */
    font-weight: 600;
}

/* Icon */
.sidebar-menu a i {
    width: 20px;
    font-size: 1.1rem;
    color: #94a3b8; /* Màu icon mặc định nhẹ nhàng */
}

.sidebar-menu a.active i,
.sidebar-menu a:hover i {
    color: #0d9488;
}

/* Đổ bóng tinh tế hơn */
.shadow-sm {
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
}
      .sidebar-menu a { display: block; padding: 15px 20px; color: #1E2C3D; text-decoration: none; border-bottom: 1px solid #eee; }
      .sidebar-menu a.active { background-color: #f8f9fa; color: #dc3545; border-left: 4px solid #dc3545; }
      .address-item { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; }
      .address-item.default { border-color: #1E2C3D; background-color: #f8f9fa; }
      .badge-default { position: absolute; top: 10px; right: 10px; background: #1E2C3D; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top custom-navbar">
    <div class="container">
        <a class="navbar-brand luxury-logo" th:href="@{/}" href="#">
            HN <span>CLOTHING</span>
        </a>
    </div>
</nav>


<div class="container mt-5 pt-5 mb-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-lg-3 mb-4">
            <div class="sidebar-menu bg-white shadow-sm rounded">
                <a th:href="@{/user/profile}"><i class="fas fa-user-circle me-2"></i> Thông tin tài khoản</a>
                <a th:href="@{/user/address}" class="active"><i class="fas fa-map-marker-alt me-2"></i> Sổ địa chỉ</a>

            </div>
        </div>

        <div class="col-lg-9">
            <div class="bg-white p-4 shadow-sm rounded">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0">Sổ địa chỉ</h4>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                        <i class="fas fa-plus me-1"></i> Thêm địa chỉ mới
                    </button>
                </div>

                <div th:if="${addresses.isEmpty()}" class="text-center py-4 text-muted">
                    Bạn chưa lưu địa chỉ nào.
                </div>

                <div th:each="addr : ${addresses}" class="address-item" th:classappend="${addr.isDefault == 1} ? 'default' : ''">
                    <span th:if="${addr.isDefault == 1}" class="badge-default">Mặc định</span>
                    <h6 class="fw-bold" th:text="${addr.fullName}"></h6>
                    <p class="mb-1 text-muted small">SĐT: <span th:text="${addr.phone}"></span></p>
                    <p class="mb-2" th:text="${addr.address}"></p>

                    <div class="mt-2">
                        <button class="btn btn-sm btn-outline-primary me-2"
                                type="button"
                                th:onclick="openEditModal(this)"
                                th:data-id="${addr.id}"
                                th:data-name="${addr.fullName}"
                                th:data-phone="${addr.phone}"
                                th:data-fulladdress="${addr.address}">
                            <i class="fas fa-edit me-1"></i> Sửa
                        </button>

                        <a th:href="@{/user/address/delete/{id}(id=${addr.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn có chắc muốn xóa địa chỉ này?');">
                            <i class="fas fa-trash me-1"></i> Xóa
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>






<div class="modal fade" id="addAddressModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/user/address/add}" method="post" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm địa chỉ mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">Tên người nhận</label><input type="text" class="form-control" name="fullName" required></div>
                <div class="mb-3"><label class="form-label">Số điện thoại</label><input type="text" class="form-control" name="phone" required></div>
                <div class="mb-3"><label class="form-label">Tỉnh/Thành phố</label><input type="text" class="form-control" name="city" required></div>
                <div class="mb-3"><label class="form-label">Quận/Huyện</label><input type="text" class="form-control" name="district" required></div>
                <div class="mb-3"><label class="form-label">Phường/Xã</label><input type="text" class="form-control" name="ward" required></div>
                <div class="mb-3"><label class="form-label">Địa chỉ cụ thể</label><input type="text" class="form-control" name="street" required></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu địa chỉ</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="editAddressModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/user/address/update}" method="post" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cập nhật địa chỉ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" name="id" id="editId">

                <div class="mb-3"><label class="form-label">Tên người nhận</label><input type="text" class="form-control" name="fullName" id="editName" required></div>
                <div class="mb-3"><label class="form-label">Số điện thoại</label><input type="text" class="form-control" name="phone" id="editPhone" required></div>
                <div class="mb-3"><label class="form-label">Tỉnh/Thành phố</label><input type="text" class="form-control" name="city" id="editCity" required></div>
                <div class="mb-3"><label class="form-label">Quận/Huyện</label><input type="text" class="form-control" name="district" id="editDistrict" required></div>
                <div class="mb-3"><label class="form-label">Phường/Xã</label><input type="text" class="form-control" name="ward" id="editWard" required></div>
                <div class="mb-3"><label class="form-label">Địa chỉ cụ thể</label><input type="text" class="form-control" name="street" id="editStreet" required></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-primary">Cập nhật</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Hàm xử lý mở Modal Sửa và điền dữ liệu
    function openEditModal(button) {
        // 1. Lấy dữ liệu từ nút bấm
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const phone = button.getAttribute('data-phone');
        const fullAddress = button.getAttribute('data-fulladdress'); // VD: "Số 1, Phường A, Quận B, Hà Nội"

        // 2. Điền thông tin cơ bản
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = name;
        document.getElementById('editPhone').value = phone;

        // 3. Tách chuỗi địa chỉ để điền vào 4 ô (Logic này dựa trên định dạng lúc lưu: Street, Ward, District, City)
        // Nếu địa chỉ không đúng định dạng 4 phần ngăn cách bởi dấu phẩy, nó sẽ điền tất cả vào ô "Đường"
        if (fullAddress) {
            const parts = fullAddress.split(',').map(s => s.trim());

            if (parts.length >= 4) {
                // Lấy phần tử cuối làm City, kế cuối làm District...
                document.getElementById('editCity').value = parts[parts.length - 1];     // Hà Nội
                document.getElementById('editDistrict').value = parts[parts.length - 2]; // Quận B
                document.getElementById('editWard').value = parts[parts.length - 3];     // Phường A

                // Các phần còn lại ở đầu gộp lại thành Street (đề phòng tên đường có dấu phẩy)
                const streetParts = parts.slice(0, parts.length - 3);
                document.getElementById('editStreet').value = streetParts.join(', ');
            } else {
                // Nếu format lạ, điền tạm vào ô Street để user tự sửa
                document.getElementById('editStreet').value = fullAddress;
                document.getElementById('editCity').value = '';
                document.getElementById('editDistrict').value = '';
                document.getElementById('editWard').value = '';
            }
        }

        // 4. Hiển thị Modal
        const modal = new bootstrap.Modal(document.getElementById('editAddressModal'));
        modal.show();
    }
</script>

</body>
</html>
